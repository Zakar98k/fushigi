<!-- <li><a href="{{ .Permalink }}">{{ .Title | markdownify }}</a></li> -->
<article>
  <!-- this <div> includes the title summary -->
  <div>
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a><span> // {{ .Date | time.Format ":date_medium" }}</span></h2>
    <p>
      {{ .WordCount }} words, {{ .ReadingTime }} min read.
    </p>
  </div>
    {{ .Summary }}
</article>
